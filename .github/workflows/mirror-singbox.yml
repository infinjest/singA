name: Mirror sing-box-lx releases

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get latest upstream release
        id: upstream
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/Leadaxe/sing-box-lx/releases/latest)
          TAG=$(echo "$RELEASE" | jq -r .tag_name)
          BODY=$(echo "$RELEASE" | jq -r .body | head -c 500)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if already mirrored
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.upstream.outputs.tag }})
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download assets
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          for ARCH in linux-arm64; do
            ASSET="sing-box-${TAG#v}-${ARCH}.tar.gz"
            echo "Downloading upstream asset: ${ASSET}"
            curl -sfL "https://github.com/Leadaxe/sing-box-lx/releases/download/${TAG}/${ASSET}" \
              -o "${ASSET}"
          done

      - name: Create mirrored release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.tag }}
          name: "sing-box-lx ${{ steps.upstream.outputs.tag }}"
          body: |
            Automated mirror of Leadaxe/sing-box-lx ${{ steps.upstream.outputs.tag }}
            ${{ steps.upstream.outputs.body }}
          files: "*.tar.gz"

      - name: Prune older mirrored releases
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          KEEP="${{ steps.upstream.outputs.tag }}"
          gh release list --repo "${{ github.repository }}" --json tagName,name --jq \
            '.[] | select(.name | startswith("sing-box-lx ")) | select(.tagName != "'"$KEEP"'") | .tagName' \
          | while read -r OLD_TAG; do
              echo "Removing superseded mirror: ${OLD_TAG}"
              gh release delete "${OLD_TAG}" --repo "${{ github.repository }}" --yes --cleanup-tag \
                || echo "::warning::Failed to delete release/tag ${OLD_TAG} (the tag may already be gone)"
            done